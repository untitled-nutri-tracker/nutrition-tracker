name: Nightly Release

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:
    inputs:
      force_build:
        description: "Build even if main has not been updated in the last 24 hours"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: nightly-release
  cancel-in-progress: false

jobs:
  noop:
    runs-on: ubuntu-latest
    steps:
