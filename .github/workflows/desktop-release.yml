name: Desktop Release

on:
  push:
    branches:
      - main # Triggers automatically when you merge code into main
  workflow_dispatch: # Allows you to manually trigger a release from the GitHub UI

permissions:
  contents: write

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      is_new_version: ${{ steps.check.outputs.is_new_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all history and tags
      
      - name: Strict Version Check
        id: check
        run: |
          APP_VERSION=$(jq -r '.version' package.json)
          
          # Edge Case: Invalid SemVer format
          if ! [[ "$APP_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?$ ]]; then
            echo "Error: Version $APP_VERSION is not valid SemVer format."
            echo "is_new_version=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          
          # Edge Case: Downgrading to a lower version
          LATEST_TAG=$(git tag -l "app-v*" | sed 's/^app-v//' | sort -V | tail -n 1)
          
          if [ -z "$LATEST_TAG" ]; then
            echo "No previous releases found. Proceeding with initial release $APP_VERSION."
            echo "is_new_version=true" >> "$GITHUB_OUTPUT"
            echo "APP_VERSION=$APP_VERSION" >> "$GITHUB_ENV"
            exit 0
          fi
          
          # Compare versions using GNU sort
          HIGHEST=$(printf "%s\n%s" "$LATEST_TAG" "$APP_VERSION" | sort -V | tail -n 1)
          
          if [ "$HIGHEST" = "$APP_VERSION" ] && [ "$APP_VERSION" != "$LATEST_TAG" ]; then
            echo "Success: $APP_VERSION is strictly greater than previous latest ($LATEST_TAG). Proceeding."
            echo "is_new_version=true" >> "$GITHUB_OUTPUT"
            echo "APP_VERSION=$APP_VERSION" >> "$GITHUB_ENV"
          else
            echo "Skipping: Proposed version $APP_VERSION is NOT strictly greater than latest release $LATEST_TAG."
            echo "is_new_version=false" >> "$GITHUB_OUTPUT"
          fi

  release-desktop:
    needs: check-version
    if: needs.check-version.outputs.is_new_version == 'true'
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # Apple Silicon (M1/M2/M3) Macs
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
          # Intel Macs
          - platform: 'macos-13'
            args: '--target x86_64-apple-darwin'
          
          # Windows support
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin' || 'x86_64-apple-darwin' }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri"

      - name: Install dependencies
        run: npm ci

      - name: Build and Release Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: app-v${{ env.APP_VERSION }}
          releaseName: 'Nutrition Tracker v${{ env.APP_VERSION }}'
          releaseBody: 'See the assets below to download the latest Mac and Windows installers.'
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
