name: Desktop Release

on:
  push:
    tags:
      - 'v*' # Triggers automatically when you push a tag like v0.1.0
  workflow_dispatch: # Allows you to manually trigger a release from the GitHub UI

permissions:
  contents: write

jobs:
  release-desktop:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # Apple Silicon (M1/M2/M3) Macs
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
          # Intel Macs
          - platform: 'macos-13'
            args: '--target x86_64-apple-darwin'
          
          # Uncomment below to add Windows support in the future!
          # - platform: 'windows-latest'
          #   args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin' || 'x86_64-apple-darwin' }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri"

      - name: Install dependencies
        run: npm ci

      - name: Build and Release Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # By leaving tagName blank, Tauri automatically uses the pushed git tag (e.g. "v1.0.0")
          releaseName: 'Nutrition Tracker ${{ github.ref_name }}'
          releaseBody: 'See the assets below to download the latest Mac Desktop installer.'
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
