name: CI

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main", "dev" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    # Install Linux dependencies required by Tauri
    - name: Install system dependencies for Tauri
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libgtk-3-dev \
          libwebkit2gtk-4.1-dev \
          libappindicator3-dev \
          librsvg2-dev \
          patchelf

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Install Node
      uses: actions/setup-node@v3
      with:
        node-version: 18

    - name: Install frontend deps
      run: npm install

    - name: Build frontend
      run: npm run build

    - name: Build Tauri
      run: cargo build --release

    - name: Run Rust tests
      run: cargo test
